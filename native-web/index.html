<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0414" />
  <title>SnapNext AI</title>
  <style>
    :root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0414;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{max-width:28rem;margin:1.5rem;padding:2rem;border:1px solid rgba(255,255,255,.12);border-radius:1.5rem;background:rgba(255,255,255,.04);text-align:center}.mark{width:4rem;height:4rem;margin:auto;border-radius:1.25rem;display:grid;place-items:center;background:linear-gradient(135deg,#ec4899,#9333ea);font-weight:900;font-size:1.25rem}.muted{color:rgba(255,255,255,.62);line-height:1.55}.button{display:inline-block;margin-top:1rem;padding:.8rem 1.1rem;border-radius:999px;background:#fff;color:#12051a;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">SN</div>
    <h1>SnapNext AI</h1>
    <p class="muted">Connect to the internet to open your private memory vault. Previously downloaded device content remains controlled by your phone.</p>
    <a class="button" href="https://snapnext.ai">Try again</a>
  </main>
</body>
</html>
