name: Product quality gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and production build
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run repository test suite and production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee product-quality.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-quality-log
          path: product-quality.log
          if-no-files-found: ignore
          retention-days: 7
