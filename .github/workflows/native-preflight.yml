name: Native preflight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'capacitor.config.ts'
      - 'native-web/**'
      - 'native/**'
      - 'scripts/native-*.mjs'
      - 'scripts/*-policy-check.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-preflight.yml'

permissions:
  contents: read

concurrency:
  group: native-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android API 36 debug build
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm install --no-audit --no-fund
      - run: npm run native:bootstrap:android
      - run: npm run native:preflight -- --require=android
      - run: npm run policy:android
      - name: Compile Android shell
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: iOS 26 simulator build
    runs-on: macos-26
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run native:bootstrap:ios
      - run: npm run native:preflight -- --require=ios
      - run: npm run policy:ios
      - name: Compile iOS shell without signing
        shell: bash
        run: |
          if [ -d ios/App/App.xcworkspace ]; then
            xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
          else
            xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
          fi
