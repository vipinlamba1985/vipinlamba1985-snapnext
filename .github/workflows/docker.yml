name: Docker Image

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '.env.docker.example'
      - 'app/api/health/route.js'
      - 'docs/DOCKER_SETUP.md'
      - 'tests/docker-config.test.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: snapnext-ai:ci
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run --detach \
            --name snapnext-docker-test \
            --publish 3000:3000 \
            snapnext-ai:ci

      - name: Verify health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --silent --show-error --fail http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs snapnext-docker-test
          exit 1

      - name: Show container status on failure
        if: failure()
        run: |
          docker ps --all
          docker logs snapnext-docker-test || true

      - name: Stop container
        if: always()
        run: docker rm --force snapnext-docker-test || true
